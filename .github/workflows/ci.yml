name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── 1. Lint ─────────────────────────────────────────────────────────
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install ruff
        run: pip install ruff==0.9.10

      - name: Check style
        run: ruff check rac/ tests/ --select E,F,W,I

  # ── 2. Type check ───────────────────────────────────────────────────
  typecheck:
    name: Type check (mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install deps
        run: pip install -r requirements-dev.txt

      - name: Run mypy
        run: mypy rac/ --ignore-missing-imports --no-strict-optional

  # ── 3. Tests ────────────────────────────────────────────────────────
  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install deps
        run: pip install -r requirements-dev.txt

      - name: Run pytest
        run: pytest tests/ -v --tb=short
        env:
          RAC_TRADING_MODE: paper
          DATABASE_URL: ""
          REDIS_URL: ""
          EVENT_BUS_URL: ""
          ALPACA_API_KEY: ""
          ALPACA_API_SECRET: ""
          ALPACA_PAPER_BASE_URL: "https://paper-api.alpaca.markets/v2"
          ALPACA_DATA_BASE_URL: "https://data.alpaca.markets/v2"
          RAC_SYMBOLS: "AAPL"
          RAC_TIMEFRAME: "1Min"
          RAC_LOOP_INTERVAL: "60"
          TELEGRAM_BOT_TOKEN: ""
          TELEGRAM_CHAT_ID: ""

  # ── 4. Security ─────────────────────────────────────────────────────
  security:
    name: Security (pip-audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Audit dependencies
        run: pip-audit -r requirements.txt

  # ── 5. Docker build ─────────────────────────────────────────────────
  docker-build:
    name: Docker build
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build API image
        run: docker build --target api -t rac/api:ci .

      - name: Build worker image
        run: docker build --target worker -t rac/worker:ci .
