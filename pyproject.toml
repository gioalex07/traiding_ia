[tool.ruff]
target-version = "py312"
line-length = 120

[tool.ruff.lint]
select = ["E", "F", "W", "I", "UP"]
ignore = [
    "E501",   # line too long — revisado en PR, no en CI
    "UP007",  # X | Y — ya usamos esta sintaxis
]

[tool.ruff.lint.isort]
known-first-party = ["rac"]

[tool.mypy]
python_version = "3.12"
ignore_missing_imports = true
warn_return_any = false
disallow_untyped_defs = true
no_implicit_optional = true
