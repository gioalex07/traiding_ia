[tool.ruff]
target-version = "py312"
line-length = 120

[tool.ruff.lint]
select = ["E", "F", "W", "I", "UP"]
ignore = [
    "E501",   # line too long — revisado en PR, no en CI
    "UP007",  # X | Y — ya usamos esta sintaxis
]

[tool.ruff.lint.isort]
known-first-party = ["rac"]

[tool.ruff.lint.per-file-ignores]
"tests/test_daily_report.py" = ["I001"]
"rac/dashboard/html.py" = ["E501"]

[tool.pytest.ini_options]
pythonpath = ["."]

[tool.mypy]
python_version = "3.12"
ignore_missing_imports = true
warn_return_any = false
disallow_untyped_defs = true
no_implicit_optional = true

# Módulos que manejan datos JSON/DB dinámicos: desactivar falsos positivos
# conocidos de dict[str, object]. Los errores estructurales reales (override,
# return-value) sí se detectan globalmente.
[[tool.mypy.overrides]]
module = [
    "rac.brokers.alpaca",
    "rac.discovery.service",
    "rac.features.engine",
    "rac.strategies.trend_following",
    "rac.backtest.engine",
    "rac.backtest.metrics",
    "rac.orders.reconciliation",
    "rac.orders.executor",
    "rac.worker.loop",
    "rac.api.main",
]
disable_error_code = ["arg-type", "index", "attr-defined", "call-overload", "dict-item"]
